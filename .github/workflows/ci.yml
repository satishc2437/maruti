name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.5"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            mcp-tools/*/pyproject.toml

      - name: Pin Python
        run: uv python install 3.14

      - name: Sync workspace
        run: uv sync --dev --all-packages

      - name: Docstring lint (ruff D)
        run: uv run ruff check --select D mcp-tools/*/src

      - name: Pylint (zero E/W/F)
        run: uv run pylint mcp-tools/*/src

      - name: Tests + coverage (agent-memory)
        working-directory: mcp-tools/agent-memory
        run: uv run pytest -q

      - name: Tests + coverage (pdf-reader)
        working-directory: mcp-tools/pdf-reader
        run: uv run pytest -q

      - name: Tests + coverage (xlsx-reader)
        working-directory: mcp-tools/xlsx-reader
        run: uv run pytest -q

      - name: Agent symlink mirror check
        run: python scripts/link_agents.py check
